<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKHOOP USA — Wholesale Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f7f5;--bg3:#f2f1ee;
  --text:#1a1a1a;--muted:#6b6b68;--hint:#9b9b97;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --r:6px;--rm:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --green-bg:#EAF3DE;--green-tx:#3B6D11;
  --amber-bg:#FAEEDA;--amber-tx:#854F0B;
  --blue-bg:#E6F1FB;--blue-tx:#185FA5;
  --gray-bg:#F1EFE8;--gray-tx:#5F5E5A;
  --red-bg:#FCEBEB;--red-tx:#A32D2D;
  --purple-bg:#EEEDFE;--purple-tx:#534AB7;
  --teal-bg:#E1F5EE;--teal-tx:#0F6E56;
}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:50;gap:12px}
.brand{font-size:12px;font-weight:600;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:var(--rm);padding:3px}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:var(--font);transition:all .12s;white-space:nowrap}
.tab.active{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 0 0 0.5px var(--border)}
.tab:hover:not(.active){color:var(--text);background:rgba(0,0,0,0.04)}
.topbar-actions{display:flex;gap:6px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--rm);font-size:13px;cursor:pointer;font-family:var(--font);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);transition:background .1s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#2d2d2d}
.btn.sm{padding:5px 10px;font-size:12px}
.btn i{font-size:15px}
.content{padding:24px;max-width:1300px;margin:0 auto;width:100%;flex:1}
.metric-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:var(--hint);margin-top:3px}
.metric.highlight{border-color:var(--teal-tx);background:var(--teal-bg)}
.metric.highlight .metric-label{color:var(--teal-tx)}
.metric.highlight .metric-value{color:var(--teal-tx)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:15px;font-weight:500}
.search-row{display:flex;gap:8px;margin-bottom:14px}
.search-row input,.search-row select{padding:8px 12px;border-radius:var(--rm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font)}
.search-row input{flex:1}
.search-row input:focus,.search-row select:focus{outline:none;border-color:#888}
.table-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;font-weight:500;color:var(--muted);background:var(--bg2);border-bottom:0.5px solid var(--border);font-size:11px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
td{padding:10px 14px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--bg2)}
.empty-td{text-align:center;padding:36px;color:var(--hint);font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.bg-green{background:var(--green-bg);color:var(--green-tx)}
.bg-amber{background:var(--amber-bg);color:var(--amber-tx)}
.bg-blue{background:var(--blue-bg);color:var(--blue-tx)}
.bg-gray{background:var(--gray-bg);color:var(--gray-tx)}
.bg-red{background:var(--red-bg);color:var(--red-tx)}
.bg-purple{background:var(--purple-bg);color:var(--purple-tx)}
.back-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;font-family:var(--font);padding:0;margin-bottom:14px}
.back-btn:hover{color:var(--text)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:20px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:18px;border-bottom:0.5px solid var(--border)}
.card-title{font-size:19px;font-weight:500;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted)}
.card-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.info-item label{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
.info-item span{font-size:13px}
.sub-section{margin-bottom:18px}
.sub-title{font-size:13px;font-weight:500;margin-bottom:10px}
.order-totals{display:flex;justify-content:flex-end;padding-top:14px}
.totals-block{text-align:right}
.totals-line{font-size:13px;color:var(--muted);margin-bottom:4px}
.totals-amount{font-size:20px;font-weight:500}
.profit-block{background:var(--teal-bg);border-radius:var(--rm);padding:12px 16px;margin-top:14px;display:flex;justify-content:flex-between;align-items:center;gap:24px}
.profit-item{text-align:right}
.profit-item label{font-size:11px;color:var(--teal-tx);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.profit-item span{font-size:15px;font-weight:500;color:var(--teal-tx)}
.status-select{padding:5px 10px;border-radius:var(--rm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:12px;font-family:var(--font);cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:200;overflow-y:auto}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border);padding:28px;width:560px;max-width:100%;margin-bottom:40px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.form-row{margin-bottom:13px}
.form-row label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 12px;border-radius:var(--rm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-family:var(--font)}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#888;background:var(--bg)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--rl);padding:26px;text-align:center;cursor:pointer;color:var(--muted);margin-bottom:12px;transition:all .15s}
.drop-zone:hover{border-color:#888;color:var(--text);background:var(--bg2)}
.drop-zone i{font-size:26px;display:block;margin-bottom:8px}
.preview-wrap{overflow-x:auto;border:0.5px solid var(--border);border-radius:var(--rm);margin-bottom:12px;max-height:200px;overflow-y:auto}
.preview-table{width:100%;border-collapse:collapse;font-size:12px}
.preview-table th{background:var(--bg2);padding:7px 10px;font-weight:500;border-bottom:0.5px solid var(--border);white-space:nowrap;position:sticky;top:0}
.preview-table td{padding:5px 10px;border-bottom:0.5px solid var(--border);white-space:nowrap}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 18px;border-radius:var(--rm);font-size:13px;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.col-hint{font-size:12px;color:var(--muted);background:var(--bg2);border-radius:var(--rm);padding:10px 14px;margin-bottom:12px;line-height:1.6}
.comm-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.comm-row:last-child{border-bottom:none}
.commission-badge{background:var(--purple-bg);color:var(--purple-tx);padding:3px 8px;border-radius:4px;font-size:12px;font-weight:500}
@media(max-width:900px){.metric-row{grid-template-columns:repeat(3,1fr)}.info-grid{grid-template-columns:1fr 1fr}.topbar{flex-wrap:wrap;height:auto;padding:12px 16px;gap:8px}.content{padding:16px}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="brand">SKHOOP USA — Wholesale</span>
    <div class="tabs">
      <button class="tab active" onclick="showTab('retailers')">Retailers</button>
      <button class="tab" onclick="showTab('orders')">Orders</button>
      <button class="tab" onclick="showTab('products')">Products</button>
      <button class="tab" onclick="showTab('reps')">Sales Reps</button>
    </div>
    <div class="topbar-actions">
      <button class="btn" onclick="showImportModal()"><i class="ti ti-upload"></i> Import CSV</button>
      <button class="btn" onclick="backupData()"><i class="ti ti-database-export"></i> Backup</button>
      <button class="btn" onclick="showRestoreModal()"><i class="ti ti-database-import"></i> Restore</button>
      <button class="btn" onclick="showResetModal()" style="color:var(--red-tx);border-color:var(--red-tx)"><i class="ti ti-trash"></i> Reset</button>
      <button class="btn primary" onclick="showAddModal()"><i class="ti ti-plus"></i> Add New</button>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</div>

<script>
const SK='skhoop_wholesale_v1';
function loadState(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s)}catch(e){}return null}
function saveState(){try{localStorage.setItem(SK,JSON.stringify({retailers:S.retailers,orders:S.orders,products:S.products,reps:S.reps}))}catch(e){toast('Storage error','warn')}}
function persist(msg){saveState();if(msg)toast(msg)}

const seed={
  reps:[
    {id:1,name:'Jamie Carlson',email:'jamie@rep.com',phone:'720-555-0101',territory:'Mountain West',rate:10,status:'active',retailers:[1,3]},
    {id:2,name:'Dana Park',email:'dana@rep.com',phone:'503-555-0204',territory:'Pacific Northwest',rate:10,status:'active',retailers:[2]},
  ],
  retailers:[
    {id:1,name:'Alpine Gear Co.',contact:'Sarah Hill',email:'sarah@alpinegear.com',phone:'303-555-0182',city:'Denver',state:'CO',address:'',terms:'Net 30',status:'active',repId:1,orders:[101,103]},
    {id:2,name:'Nordic Threads',contact:'Erik Larsen',email:'erik@nordicthreads.com',phone:'612-555-0291',city:'Minneapolis',state:'MN',address:'',terms:'Net 30',status:'active',repId:2,orders:[102]},
    {id:3,name:'Summit Sports',contact:'Jenna Park',email:'jenna@summitsports.com',phone:'208-555-0167',city:'Boise',state:'ID',address:'',terms:'Net 60',status:'active',repId:1,orders:[104]},
  ],
  orders:[
    {id:101,retailerId:1,orderId:'ORD-4421',date:'2025-01-15',shipDate:'2025-02-01',season:'Spring 2025',status:'confirmed',commRate:10,lines:[
      {sku:'SK-J01-BLK-S',name:'Delta Jacket',color:'Black',size:'S',qty:3,wholesale:89.00,upc:'0123456789001'},
      {sku:'SK-J01-BLK-M',name:'Delta Jacket',color:'Black',size:'M',qty:5,wholesale:89.00,upc:'0123456789002'},
      {sku:'SK-P02-BLK-M',name:'Summit Pants',color:'Black',size:'M',qty:6,wholesale:72.00,upc:'0123456789010'},
    ]},
    {id:102,retailerId:2,orderId:'ORD-7731',date:'2025-01-18',shipDate:'2025-02-05',season:'Spring 2025',status:'shipped',commRate:10,lines:[
      {sku:'SK-V01-RED-XS',name:'Vertex Vest',color:'Red',size:'XS',qty:4,wholesale:54.00,upc:'0123456789020'},
      {sku:'SK-V01-RED-S',name:'Vertex Vest',color:'Red',size:'S',qty:6,wholesale:54.00,upc:'0123456789021'},
    ]},
    {id:104,retailerId:3,orderId:'ORD-9912',date:'2025-02-10',shipDate:'2025-03-01',season:'Spring 2025',status:'confirmed',commRate:10,lines:[
      {sku:'SK-J01-BLK-L',name:'Delta Jacket',color:'Black',size:'L',qty:5,wholesale:89.00,upc:'0123456789004'},
      {sku:'SK-P02-CHR-M',name:'Summit Pants',color:'Charcoal',size:'M',qty:6,wholesale:72.00,upc:'0123456789012'},
    ]},
  ],
  products:[
    {sku:'SK-J01-BLK-S',name:'Delta Jacket',color:'Black',size:'S',wholesale:89.00,msrp:178.00,landed:42.00,upc:'0123456789001',category:'Jackets'},
    {sku:'SK-J01-BLK-M',name:'Delta Jacket',color:'Black',size:'M',wholesale:89.00,msrp:178.00,landed:42.00,upc:'0123456789002',category:'Jackets'},
    {sku:'SK-J01-BLK-L',name:'Delta Jacket',color:'Black',size:'L',wholesale:89.00,msrp:178.00,landed:42.00,upc:'0123456789004',category:'Jackets'},
    {sku:'SK-P02-BLK-M',name:'Summit Pants',color:'Black',size:'M',wholesale:72.00,msrp:148.00,landed:34.00,upc:'0123456789010',category:'Bottoms'},
    {sku:'SK-P02-CHR-M',name:'Summit Pants',color:'Charcoal',size:'M',wholesale:72.00,msrp:148.00,landed:34.00,upc:'0123456789012',category:'Bottoms'},
    {sku:'SK-V01-RED-XS',name:'Vertex Vest',color:'Red',size:'XS',wholesale:54.00,msrp:108.00,landed:26.00,upc:'0123456789020',category:'Vests'},
    {sku:'SK-V01-RED-S',name:'Vertex Vest',color:'Red',size:'S',wholesale:54.00,msrp:108.00,landed:26.00,upc:'0123456789021',category:'Vests'},
  ]
};

const saved=loadState();
const S={
  tab:'retailers',view:'list',sel:null,searchQ:'',filterStatus:'all',filterSeason:'all',
  reps:saved?saved.reps:seed.reps,
  retailers:saved?saved.retailers:seed.retailers,
  orders:saved?saved.orders:seed.orders,
  products:saved?saved.products:seed.products,
};

// Ensure commRate exists on old orders
S.orders.forEach(o=>{if(o.commRate===undefined)o.commRate=10});

const $=id=>document.getElementById(id);
const fmt=n=>'$'+Number(n).toFixed(2);
const fmtN=n=>Number(n).toFixed(2);
const getR=id=>S.retailers.find(r=>r.id===id);
const getO=id=>S.orders.find(o=>o.id===id);
const getRep=id=>S.reps.find(r=>r.id===id);

function orderRevenue(o){return o.lines.reduce((a,l)=>a+l.qty*l.wholesale,0)}
function orderLandedCost(o){return o.lines.reduce((a,l)=>{const p=S.products.find(x=>x.sku===l.sku);return a+l.qty*(p&&p.landed?p.landed:0)},0)}
function orderCommission(o){return orderRevenue(o)*(o.commRate||0)/100}
function orderProfit(o){return orderRevenue(o)-orderLandedCost(o)-orderCommission(o)}

function totalRevenue(){return S.orders.reduce((a,o)=>a+orderRevenue(o),0)}
function totalProfit(){return S.orders.reduce((a,o)=>a+orderProfit(o),0)}
function totalCommissions(){return S.orders.reduce((a,o)=>a+orderCommission(o),0)}

function statusBadge(s){
  const m={active:'bg-green',inactive:'bg-gray',confirmed:'bg-blue',shipped:'bg-green',pending:'bg-amber',cancelled:'bg-red'};
  return`<span class="badge ${m[s]||'bg-gray'}">${s}</span>`;
}

function toast(msg,type){
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<i class="ti ti-${type==='warn'?'alert-triangle':'circle-check'}"></i> ${msg}`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3800);
}

/* ─── Routing ─── */
function showTab(t){
  S.tab=t;S.view='list';S.sel=null;S.searchQ='';S.filterStatus='all';S.filterSeason='all';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['retailers','orders','products','reps'][i]===t));
  render();
}
function handleSearch(val){
  S.searchQ=val;
  const activeInput=document.activeElement;
  const activeId=activeInput?activeInput.id:null;
  const pos=activeInput&&activeInput.selectionStart!==undefined?activeInput.selectionStart:null;
  render();
  if(activeId){
    const el=document.getElementById(activeId);
    if(el){el.focus();if(pos!==null&&el.setSelectionRange)el.setSelectionRange(pos,pos);}
  }
}
function render(){
  const el=$('main-content');
  if(S.tab==='retailers') el.innerHTML=S.view==='detail'&&S.sel?renderRetailerDetail():renderRetailers();
  else if(S.tab==='orders') el.innerHTML=S.view==='detail'&&S.sel?renderOrderDetail():renderOrders();
  else if(S.tab==='products') el.innerHTML=renderProducts();
  else el.innerHTML=S.view==='detail'&&S.sel?renderRepDetail():renderReps();
}

/* ─── Dashboard metrics ─── */
function dashMetrics(orders,label4,label5,val4,val5,highlight5){
  const rev=orders.reduce((a,o)=>a+orderRevenue(o),0);
  const profit=orders.reduce((a,o)=>a+orderProfit(o),0);
  return`<div class="metric-row">
    <div class="metric"><div class="metric-label">Total orders</div><div class="metric-value">${orders.length}</div></div>
    <div class="metric"><div class="metric-label">Total units</div><div class="metric-value">${orders.reduce((a,o)=>a+o.lines.reduce((b,l)=>b+l.qty,0),0)}</div></div>
    <div class="metric"><div class="metric-label">Revenue</div><div class="metric-value">$${Math.round(rev).toLocaleString()}</div><div class="metric-sub">wholesale</div></div>
    <div class="metric"><div class="metric-label">${label4}</div><div class="metric-value">${val4}</div></div>
    <div class="metric${highlight5?' highlight':''}"><div class="metric-label">${label5}</div><div class="metric-value">${val5}</div><div class="metric-sub">after landed cost & commissions</div></div>
  </div>`;
}

/* ─── Retailers ─── */
function renderRetailers(){
  const q=S.searchQ.toLowerCase();
  const list=S.retailers.filter(r=>(!q||r.name.toLowerCase().includes(q)||r.city.toLowerCase().includes(q))&&(S.filterStatus==='all'||r.status===S.filterStatus));
  const rev=totalRevenue(),profit=totalProfit(),comms=totalCommissions();
  return`
  <div class="metric-row">
    <div class="metric"><div class="metric-label">Retailers</div><div class="metric-value">${S.retailers.filter(r=>r.status==='active').length} active</div></div>
    <div class="metric"><div class="metric-label">Total orders</div><div class="metric-value">${S.orders.length}</div></div>
    <div class="metric"><div class="metric-label">Season revenue</div><div class="metric-value">$${Math.round(rev).toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">Total commissions</div><div class="metric-value">$${Math.round(comms).toLocaleString()}</div></div>
    <div class="metric highlight"><div class="metric-label">Net operating profit</div><div class="metric-value">$${Math.round(profit).toLocaleString()}</div><div class="metric-sub">after landed cost & commissions</div></div>
  </div>
  <div class="section-header"><span class="section-title">Retailers</span></div>
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Search by name or city..." value="${S.searchQ}" oninput="handleSearch(this.value)">
    <select onchange="S.filterStatus=this.value;render()">
      <option value="all">All statuses</option>
      <option value="active" ${S.filterStatus==='active'?'selected':''}>Active</option>
      <option value="inactive" ${S.filterStatus==='inactive'?'selected':''}>Inactive</option>
    </select>
  </div>
  <div class="table-wrap"><table>
    <thead><tr><th>Retailer</th><th>Location</th><th>Sales rep</th><th>Terms</th><th>Orders</th><th>Revenue</th><th>Net profit</th><th>Status</th><th></th></tr></thead>
    <tbody>${list.length?list.map(r=>{
      const rOrders=S.orders.filter(o=>(r.orders||[]).includes(o.id));
      const rev=rOrders.reduce((a,o)=>a+orderRevenue(o),0);
      const profit=rOrders.reduce((a,o)=>a+orderProfit(o),0);
      const rep=getRep(r.repId);
      return`<tr class="clickable" onclick="openRetailer(${r.id})">
        <td style="font-weight:500">${r.name}</td>
        <td>${[r.city,r.state].filter(Boolean).join(', ')||'—'}</td>
        <td>${rep?rep.name:'<span style="color:var(--hint)">Unassigned</span>'}</td>
        <td>${r.terms}</td>
        <td>${(r.orders||[]).length}</td>
        <td>${fmt(rev)}</td>

function saveOrderEdits(id){
  const o=getO(id);
  if(!o)return;
  const newRetailerId=parseInt($('eo-retailer').value);
  // If retailer changed, update order lists on both retailers
  if(newRetailerId!==o.retailerId){
    const oldR=getR(o.retailerId);
    if(oldR)oldR.orders=(oldR.orders||[]).filter(x=>x!==id);
    const newR=getR(newRetailerId);
    if(newR){newR.orders=newR.orders||[];if(!newR.orders.includes(id))newR.orders.push(id);}
  }
  o.orderId=$('eo-id').value.trim();
  o.retailerId=newRetailerId;
  o.date=$('eo-date').value;
  o.shipDate=$('eo-ship').value;
  o.season=$('eo-season').value;
  o.commRate=parseFloat($('eo-comm').value)||10;
  o.status=$('eo-status').value;
  o.terms=$('eo-terms').value||null;
  o.notes=$('eo-notes').value;
  persist('Order updated');closeModal();render();
}

function updateLinePrice(orderId,lineIdx,val){
  const o=getO(orderId);if(!o)return;
  const price=parseMoney(val);
  o.lines[lineIdx].wholesale=price;
  const totalEl=document.getElementById(`line-total-${orderId}-${lineIdx}`);
  if(totalEl)totalEl.textContent=fmt(o.lines[lineIdx].qty*price);
  persist();
}

function updateLineQty(orderId,lineIdx,val){
  const o=getO(orderId);if(!o)return;
  const qty=parseInt(val)||0;
  o.lines[lineIdx].qty=qty;
  const totalEl=document.getElementById(`line-total-${orderId}-${lineIdx}`);
  if(totalEl)totalEl.textContent=fmt(qty*o.lines[lineIdx].wholesale);
  persist();
}

function updateLineField(orderId,lineIdx,field,val){
  const o=getO(orderId);if(!o)return;
  o.lines[lineIdx][field]=val;
  persist();
}

function deleteOrderLine(orderId,lineIdx){
  const o=getO(orderId);if(!o)return;
  o.lines.splice(lineIdx,1);
  persist();render();
}

function resyncOrderFromCatalog(id){
  const o=getO(id);if(!o)return;
  let filled=0;
  o.lines.forEach(l=>{
    const p=S.products.find(x=>x.sku===l.sku);
    if(!p)return;
    // Only fill in fields that are blank — never overwrite intentional edits
    let changed=false;
    if(!l.name&&p.name){l.name=p.name;changed=true;}
    if(!l.color&&p.color){l.color=p.color;changed=true;}
    if(!l.size&&p.size){l.size=p.size;changed=true;}
    if(!l.upc&&p.upc){l.upc=p.upc;changed=true;}
    if(!l.wholesale&&p.wholesale){l.wholesale=p.wholesale;changed=true;}
    if(changed)filled++;
  });
  if(filled>0){persist();render();toast(`Re-synced ${filled} line${filled!==1?'s':''} from catalog`);}
  else toast('Nothing to update — all lines already have catalog data');
}

  $('al-size').value=p.size||'';
  $('al-upc').value=p.upc||'';
  $('al-ws').value=p.wholesale?p.wholesale.toFixed(2):'';

function saveLineItem(orderId){
  const o=getO(orderId);if(!o)return;
  const sku=($('al-sku').value||'').trim();
  if(!sku){toast('SKU is required','warn');return;}
  const qty=parseInt($('al-qty').value)||0;

    name:$('al-name').value||'',

    size:$('al-size').value||'',

function deleteOrder(id){
  // Remove from retailer's order list
  const o=getO(id);
  if(o){const r=getR(o.retailerId);if(r)r.orders=(r.orders||[]).filter(x=>x!==id);}
  // Remove order
  const idx=S.orders.findIndex(x=>x.id===id);
  if(idx>-1)S.orders.splice(idx,1);
  persist('Order deleted');closeModal();
  S.view='list';S.sel=null;render();
}

/* ─── CSV Exports ─── */
function exportOrderCSV(id){
  const o=getO(id),r=getR(o.retailerId);
  const rev=orderRevenue(o),units=o.lines.reduce((a,l)=>a+l.qty,0);
  // Note: landed cost intentionally omitted from customer-facing export
  let csv='SKHOOP\n';
  const orderTerms=o.terms||(r?r.terms:'Net 30');
  csv+=`Retailer,${r?r.name:''}\nOrder ID,${o.orderId||o.id}\nSeason,${o.season}\nOrder Date,${o.date}\nShip Date,${o.shipDate||'TBD'}\nPayment Terms,${orderTerms}\n`;
  if(r&&r.address)csv+=`Ship To,"${r.address}, ${[r.city,r.state,r.zip].filter(Boolean).join(', ')}"\n`;
  csv+='\nSKU,Product Name,Color,Size,UPC,Qty Ordered,WS $,MSRP $,Line Total\n';
  o.lines.forEach(l=>{
    const p=S.products.find(x=>x.sku===l.sku);
    csv+=`${l.sku},"${l.name}",${l.color},${l.size},${l.upc||''},${l.qty},${fmtN(l.wholesale)},${p?fmtN(p.msrp):''},${fmtN(l.qty*l.wholesale)}\n`;
  });
  csv+=`\nTotal Units,,,,,${units},,\nOrder Total,,,,,,,,${fmtN(rev)}\n`;
  dlCSV(csv,`SKHOOP_${(r?r.name:'Order').replace(/\s+/g,'-')}_${o.orderId||o.id}.csv`);
  toast('Order sheet exported (landed cost excluded)');
}

function exportCatalogCSV(){
  let csv='SKU,Product Name,Category,Color,Size,UPC,Wholesale ($),MSRP ($),Landed Cost ($)\n';
  S.products.forEach(p=>{csv+=`${p.sku},"${p.name}",${p.category},${p.color},${p.size},${p.upc||''},${fmtN(p.wholesale)},${fmtN(p.msrp)},${p.landed?fmtN(p.landed):''}\n`;});
  dlCSV(csv,'SKHOOP-product-catalog.csv');toast('Catalog exported');
}

function exportRepCommCSV(id){
  const rep=getRep(id);
  const repRetailerIds=S.retailers.filter(r=>r.repId===id).map(r=>r.id);
  const repOrders=S.orders.filter(o=>repRetailerIds.includes(o.retailerId)&&(S.filterSeason==='all'||(o.season||'')===S.filterSeason));
  let csv=`SKHOOP USA - Commission Report\nRep,${rep.name}\nExported,${new Date().toLocaleDateString()}\n\n`;
  csv+='Order ID,Retailer,Date,Season,Revenue,Commission Rate,Commission Owed,Status\n';
  repOrders.forEach(o=>{
    const r=getR(o.retailerId);
    csv+=`${o.orderId||o.id},${r?r.name:''},${o.date},${o.season},${fmtN(orderRevenue(o))},${o.commRate}%,${fmtN(orderCommission(o))},${o.status}\n`;
  });
  const total=repOrders.reduce((a,o)=>a+orderCommission(o),0);
  csv+=`\nTotal,,,,,,$${fmtN(total)},\n`;
  dlCSV(csv,`SKHOOP_CommissionReport_${rep.name.replace(/\s+/g,'-')}.csv`);
  toast('Commission report exported');
}

function dlCSV(csv,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

function handleRestore(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.retailers||!data.orders||!data.products){toast('Invalid backup file','warn');return}
      S.retailers=data.retailers;S.orders=data.orders;S.products=data.products;S.reps=data.reps||[];
      S.orders.forEach(o=>{if(o.commRate===undefined)o.commRate=10});
      persist();closeModal();showTab('retailers');
      toast('Data restored successfully');
    }catch(e){toast('Could not read backup file','warn')}
  };reader.readAsText(file);
}

function parseCSVLine(line){
  const out=[];let cur='',inQ=false;
  for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){out.push(cur.trim());cur='';}else cur+=c;}
  out.push(cur.trim());return out;
}
function stripBOM(str){
  // Strip UTF-8 BOM that Excel adds to CSV exports
  return str.charCodeAt(0)===0xFEFF?str.slice(1):str;
}
function parseMoney(v){
  // Handles values like " $69.50 ", "$69.50", "69.50", " 69.50 "
  if(!v&&v!==0)return 0;
  const n=parseFloat(String(v).replace(/[$,\s]/g,''));
  return isNaN(n)?0:n;
}

    size:'size',
    category:'category',dept:'category',department:'category',
    landedcost:'landed',landed:'landed',cogs:'landed',cost:'landed',
    shipdate:'shipDate',shippingdate:'shipDate',requestedshipdate:'shipDate',
  };
  return map[n]||n;
}

function handleCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=stripBOM(e.target.result).split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2)return;
    const rawHeaders=parseCSVLine(lines[0]);
    const headers=rawHeaders.map(mapHeader);
    const rows=lines.slice(1).map(l=>{
      const vals=parseCSVLine(l);const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;
    }).filter(r=>r.sku||r.orderId||r.customer||r.name);
    pendingImport={rows,headers,rawHeaders};
    const prev=rows.slice(0,5);
    $('import-preview').innerHTML=`
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${rows.length} rows detected — preview (first 5):</div>
      <div class="preview-wrap"><table class="preview-table">
        <thead><tr>${headers.map((h,i)=>`<th title="${rawHeaders[i]}">${h}</th>`).join('')}</tr></thead>
        <tbody>${prev.map(r=>`<tr>${headers.map(h=>`<td>${r[h]||''}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
    $('import-btn').style.display='inline-flex';
  };reader.readAsText(file);
}

function confirmImport(){
  if(!pendingImport)return;
  const{rows}=pendingImport;
  let newRetailers=0,newOrders=0,skipped=0;

  if(importType==='products'){
    let added=0;
    rows.forEach(r=>{
      if(!r.sku)return;
      if(!S.products.find(p=>p.sku===r.sku)){
        S.products.push({sku:r.sku,name:r.name||r.description||'',color:r.color||'',size:r.size||'',upc:r.upc||'',wholesale:parseMoney(r.wholesale),msrp:parseMoney(r.msrp),landed:parseMoney(r.landed),category:r.category||'Other',season:r.season||''});
        added++;
      }
    });
    persist();closeModal();toast(`Imported ${added} new products`);showTab('products');return;
  }

  if(importType==='customers'){
    // Map customer CSV headers
    const termMap={'net30':'Net 30','net60':'Net 60','prepay':'Prepay','prepaid':'Prepay','termspending':'Terms pending','pending':'Terms pending','345net60':'3%45 Net 60','3%45net60':'3%45 Net 60'};
    let added=0,updated=0;
    rows.forEach(r=>{
      const name=(r.name||r.company||r.customer||r.retailer||'').trim();
      if(!name)return;
      // Match terms value loosely
      const rawTerms=(r.terms||r.paymentterms||'').trim();
      const termsKey=rawTerms.toLowerCase().replace(/[\s%\/\-]+/g,'');
      const terms=termMap[termsKey]||rawTerms||'Terms pending';
      // Find rep by name if provided
      const repName=(r.rep||r.salesrep||r.repname||'').trim().toLowerCase();
      const rep=repName?S.reps.find(x=>x.name.toLowerCase().includes(repName)):null;
      const existing=S.retailers.find(x=>x.name.toLowerCase()===name.toLowerCase());
      if(existing){
        // Update fields if CSV has data and existing field is blank
        if(r.contact&&!existing.contact)existing.contact=r.contact;
        if(r.email&&!existing.email)existing.email=r.email;
        if(r.phone&&!existing.phone)existing.phone=r.phone;
        if(r.address&&!existing.address)existing.address=r.address;
        if(r.city&&!existing.city)existing.city=r.city;
        if(r.state&&!existing.state)existing.state=r.state;
        if(r.zip&&!existing.zip)existing.zip=r.zip;
        if(rawTerms)existing.terms=terms;
        if(rep&&!existing.repId)existing.repId=rep.id;
        updated++;
      }else{
        const newId=S.retailers.length?Math.max(...S.retailers.map(x=>x.id))+1:1;
        S.retailers.push({id:newId,name,contact:r.contact||'',email:r.email||'',phone:r.phone||'',address:r.address||'',city:r.city||'',state:r.state||'',zip:r.zip||'',terms,status:'active',repId:rep?rep.id:null,orders:[]});
        added++;
      }
    });
    persist();closeModal();
    let msg=`Imported ${added} new retailer${added!==1?'s':''}`;
    if(updated)msg+=`, updated ${updated} existing`;
    toast(msg);showTab('retailers');return;
  }

  const orderMap={};
  rows.forEach(r=>{
    const key=(r.orderId||'').trim()||(r.customer||'').trim();
    if(!key)return;
    if(!orderMap[key])orderMap[key]={rows:[],customer:(r.customer||'').trim(),orderId:(r.orderId||'').trim(),season:r.season||'',address:r.address||'',city:r.city||'',state:r.state||'',phone:r.phone||'',shipDate:r.shipDate||''};
    orderMap[key].rows.push(r);
  });

  Object.values(orderMap).forEach(group=>{
    const custName=group.customer;if(!custName)return;
    let retailer=S.retailers.find(r=>r.name.toLowerCase()===custName.toLowerCase());
    if(!retailer){
      const newId=S.retailers.length?Math.max(...S.retailers.map(r=>r.id))+1:1;
      retailer={id:newId,name:custName,contact:'',email:'',phone:group.phone,city:group.city,state:group.state,zip:group.zip||'',address:group.address,terms:'Terms pending',status:'active',repId:null,orders:[]};
      S.retailers.push(retailer);newRetailers++;
    }else{
      if(group.address&&!retailer.address)retailer.address=group.address;
      if(group.city&&!retailer.city)retailer.city=group.city;
      if(group.state&&!retailer.state)retailer.state=group.state;
      if(group.phone&&!retailer.phone)retailer.phone=group.phone;
    }
    const orderIdStr=group.orderId;
    if(orderIdStr&&S.orders.find(o=>o.orderId===orderIdStr&&o.retailerId===retailer.id)){skipped++;return;}
    const lines=group.rows.map(r=>{
      const p=S.products.find(x=>x.sku===(r.sku||'').trim());
      return{sku:(r.sku||'').trim(),name:r.name||r.description||(p?p.name:''),color:r.color||(p?p.color:''),size:r.size||(p?p.size:''),qty:parseInt(r.qty)||0,wholesale:parseFloat(r.wholesale)||(p?p.wholesale:0),upc:r.upc||(p?p.upc:'')};
    }).filter(l=>l.qty>0);
    const newId=S.orders.length?Math.max(...S.orders.map(o=>o.id))+1:1;
    S.orders.push({id:newId,retailerId:retailer.id,orderId:orderIdStr||`IMP-${newId}`,date:new Date().toISOString().split('T')[0],shipDate:group.shipDate,season:group.season,status:'pending',commRate:10,lines});
    retailer.orders=retailer.orders||[];retailer.orders.push(newId);newOrders++;
  });

  persist();closeModal();
  let msg=`Imported ${newOrders} order${newOrders!==1?'s':''}`;
  if(newRetailers)msg+=`, created ${newRetailers} new retailer${newRetailers!==1?'s':''}`;
  if(skipped)msg+=` (${skipped} duplicate${skipped!==1?'s':''} skipped)`;
  toast(msg);showTab('orders');
}

/* ─── Modals ─── */
function showModal(html){
  const ov=document.createElement('div');ov.className='overlay';ov.id='modal-overlay';
  ov.innerHTML=`<div class="modal" id="modal-body">${html}</div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
}
function closeModal(){const m=document.getElementById('modal-overlay');if(m)m.remove();pendingImport=null}

function showAddModal(){
  if(S.tab==='retailers')showAddRetailerModal();
  else if(S.tab==='products')showAddProductModal();
  else if(S.tab==='reps')showAddRepModal();
  else showAddOrderModal(null);
}

/* Retailer modals */
function showAddRetailerModal(pf){
  const reps=[{id:null,name:'Unassigned'},...S.reps.filter(r=>r.status==='active')];
  showModal(`
    <div class="modal-title">${pf?'Edit':'Add'} retailer</div>
    <div class="two-col">
      <div class="form-row"><label>Company name</label><input id="f-name" type="text" value="${pf?pf.name:''}"></div>
      <div class="form-row"><label>Contact name</label><input id="f-contact" type="text" value="${pf?pf.contact:''}"></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Email</label><input id="f-email" type="email" value="${pf?pf.email:''}"></div>
      <div class="form-row"><label>Phone</label><input id="f-phone" type="text" value="${pf?pf.phone:''}"></div>
    </div>
    <div class="form-row"><label>Shipping address</label><input id="f-address" type="text" value="${pf?pf.address:''}"></div>
    <div class="three-col">
      <div class="form-row"><label>City</label><input id="f-city" type="text" value="${pf?pf.city:''}"></div>
      <div class="form-row"><label>State</label><input id="f-state" type="text" value="${pf?pf.state:''}"></div>
      <div class="form-row"><label>Zip code</label><input id="f-zip" type="text" value="${pf?pf.zip||'':''}"></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Payment terms</label>
        <select id="f-terms">${['Terms pending','Prepay','Net 30','Net 60','3%45 Net 60'].map(t=>`<option ${pf&&pf.terms===t?'selected':''}>${t}</option>`).join('')}</select>
      </div>
      <div class="form-row"><label>Sales rep</label>
        <select id="f-rep">${reps.map(r=>`<option value="${r.id||''}" ${pf&&pf.repId===r.id?'selected':''}>${r.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-row"><label>Status</label>
      <select id="f-status">
        <option value="active" ${!pf||pf.status==='active'?'selected':''}>Active</option>
        <option value="inactive" ${pf&&pf.status==='inactive'?'selected':''}>Inactive</option>
      </select>
    </div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes" rows="3" placeholder="Anything worth remembering about this retailer...">${pf&&pf.notes?pf.notes:''}</textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveRetailer(${pf?pf.id:'null'})">Save</button>
    </div>
  `);
}
function showEditRetailerModal(id){showAddRetailerModal(getR(id))}
function saveRetailer(id){
  const name=$('f-name').value.trim();if(!name)return;
  const repVal=$('f-rep').value;const repId=repVal?parseInt(repVal):null;
  const data={name,contact:$('f-contact').value,email:$('f-email').value,phone:$('f-phone').value,address:$('f-address').value,city:$('f-city').value,state:$('f-state').value,zip:$('f-zip').value,terms:$('f-terms').value,status:$('f-status').value,repId,notes:$('f-notes').value};
  if(id&&id!=='null'){Object.assign(getR(parseInt(id)),data);}
  else{const newId=S.retailers.length?Math.max(...S.retailers.map(r=>r.id))+1:1;S.retailers.push({id:newId,...data,orders:[]});}
  persist('Retailer saved');closeModal();render();
}

/* Rep modals */
function showAddRepModal(pf){
  showModal(`
    <div class="modal-title">${pf?'Edit':'Add'} sales rep</div>
    <div class="two-col">
      <div class="form-row"><label>Full name</label><input id="r-name" type="text" value="${pf?pf.name:''}"></div>
      <div class="form-row"><label>Territory</label><input id="r-territory" type="text" value="${pf?pf.territory:''}" placeholder="e.g. Mountain West"></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Email</label><input id="r-email" type="email" value="${pf?pf.email:''}"></div>
      <div class="form-row"><label>Phone</label><input id="r-phone" type="text" value="${pf?pf.phone:''}"></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Default commission rate (%)</label><input id="r-rate" type="number" step="0.5" min="0" max="100" value="${pf?pf.rate:10}"></div>
      <div class="form-row"><label>Status</label>
        <select id="r-status">
          <option value="active" ${!pf||pf.status==='active'?'selected':''}>Active</option>
          <option value="inactive" ${pf&&pf.status==='inactive'?'selected':''}>Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveRep(${pf?pf.id:'null'})">Save</button>
    </div>
  `);
}
function showEditRepModal(id){showAddRepModal(getRep(id))}
function saveRep(id){
  const name=$('r-name').value.trim();if(!name)return;
  const data={name,territory:$('r-territory').value,email:$('r-email').value,phone:$('r-phone').value,rate:parseFloat($('r-rate').value)||10,status:$('r-status').value};
  if(id&&id!=='null'){Object.assign(getRep(parseInt(id)),data);}
  else{const newId=S.reps.length?Math.max(...S.reps.map(r=>r.id))+1:1;S.reps.push({id:newId,...data,retailers:[]});}
  persist('Rep saved');closeModal();render();
}

/* Product modal */
function showAddProductModal(){
  showModal(`
    <div class="modal-title">Add product</div>
    <div class="two-col">
      <div class="form-row"><label>Product name</label><input id="p-name" type="text"></div>
      <div class="form-row"><label>Category</label><input id="p-cat" type="text" placeholder="Jackets, Vests, Bottoms..."></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Color</label><input id="p-color" type="text"></div>
      <div class="form-row"><label>Size</label><input id="p-size" type="text"></div>
    </div>
    <div class="form-row"><label>SKU</label><input id="p-sku" type="text"></div>
    <div class="form-row"><label>UPC</label><input id="p-upc" type="text"></div>
    <div class="three-col">
      <div class="form-row"><label>Wholesale ($)</label><input id="p-ws" type="number" step="0.01"></div>
      <div class="form-row"><label>MSRP ($)</label><input id="p-msrp" type="number" step="0.01"></div>
      <div class="form-row"><label>Landed cost ($)</label><input id="p-lc" type="number" step="0.01" placeholder="Internal only"></div>
      <div class="form-row"><label>Season</label><input id="p-season" type="text" placeholder="e.g. FW26"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveProduct()">Save</button>
    </div>
  `);
}
function saveProduct(){
  const name=$('p-name').value.trim();if(!name)return;
  S.products.push({name,category:$('p-cat').value,color:$('p-color').value,size:$('p-size').value,sku:$('p-sku').value,upc:$('p-upc').value,wholesale:parseFloat($('p-ws').value)||0,msrp:parseFloat($('p-msrp').value)||0,landed:parseFloat($('p-lc').value)||0,season:$('p-season').value.trim()});
  persist('Product saved');closeModal();render();
}

/* Order modal */
function showAddOrderModal(prefillRetailerId){
  const rOpts=S.retailers.filter(r=>r.status==='active').map(r=>`<option value="${r.id}" ${r.id===prefillRetailerId?'selected':''}>${r.name}</option>`).join('');
  showModal(`
    <div class="modal-title">New order</div>
    <div class="form-row"><label>Retailer</label><select id="o-retailer">${rOpts}</select></div>
    <div class="two-col">
      <div class="form-row"><label>Order ID</label><input id="o-id" type="text" placeholder="ORD-0000"></div>
      <div class="form-row"><label>Order date</label><input id="o-date" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Ship date</label><input id="o-ship" type="date"></div>
      <div class="form-row"><label>Season</label><input id="o-season" type="text" placeholder="Fall 2025"></div>
    </div>
    <div class="form-row"><label>Commission rate (%)</label><input id="o-comm" type="number" step="0.5" min="0" value="10"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveOrder()">Create order</button>
    </div>
  `);
}
function saveOrder(){
  const rId=parseInt($('o-retailer').value),orderId=$('o-id').value.trim();if(!orderId)return;
  const newId=S.orders.length?Math.max(...S.orders.map(o=>o.id))+1:1;
  S.orders.push({id:newId,retailerId:rId,orderId,date:$('o-date').value,shipDate:$('o-ship').value,season:$('o-season').value,status:'pending',commRate:parseFloat($('o-comm').value)||10,lines:[]});
  const r=getR(rId);if(r){r.orders=r.orders||[];r.orders.push(newId);}
  persist('Order created');closeModal();
  S.tab='orders';S.sel=newId;S.view='detail';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===1));
  render();
}

render();
</script>
